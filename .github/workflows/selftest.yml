name: Selftest

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - ".github/workflows/selftest.yml"
  pull_request:
    paths:
      - "**.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run selftest
        run: python scripts/selftest.py
